# Staticcheck configuration for amux
# This configuration enforces the error handling conventions per spec §4.2.5

# Enable all checks except those explicitly disabled
checks = ["all", "-U1000"]

# Enforce no ignored errors in core paths
# U1000 is disabled above as it triggers on legitimate unused exports in packages

# Custom configuration for specific checks
[checks."ST1003"]
# Allow underscores in certain contexts for WASM FFI
initialisms = ["HTTP", "URL", "XML", "JSON", "API", "SDK", "PTY", "HSM", "RPC", "MUID", "WASM"]