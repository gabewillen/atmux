name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'

      - name: Build
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/amux-linux-amd64 ./cmd/amux
          GOOS=darwin GOARCH=amd64 go build -o dist/amux-darwin-amd64 ./cmd/amux
          GOOS=darwin GOARCH=arm64 go build -o dist/amux-darwin-arm64 ./cmd/amux
          
          GOOS=linux GOARCH=amd64 go build -o dist/amux-node-linux-amd64 ./cmd/amux-node
          
          cd dist && sha256sum * > checksums.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
