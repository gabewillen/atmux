name: Auto-release on VERSION bump

# When a push to main changes the VERSION file (e.g. a release PR is merged),
# tag the new commit `vX.Y.Z` and cut a GitHub release with the same tarball
# layout as `release.yml` produces for manual tag-pushes.
#
# Tags pushed using GITHUB_TOKEN do NOT recursively trigger `release.yml`, so
# this workflow has to do the tag push *and* the release in one job.

on:
  push:
    branches: [main]
    paths: ['VERSION']

permissions:
  contents: write

jobs:
  release:
    name: Auto-tag and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: ver
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ -z "$version" ]]; then
            echo "error: VERSION file is empty" >&2
            exit 1
          fi
          tag="v${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Skip if tag/release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "tag $tag already exists; skipping"
            echo "exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists; skipping"
            echo "exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "exists=false" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Create release tarball
        if: steps.check.outputs.exists == 'false'
        run: |
          version="${{ steps.ver.outputs.version }}"
          git archive \
            --format=tar.gz \
            --prefix="atmux-${version}/" \
            -o "atmux-${version}.tar.gz" \
            HEAD

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: atmux-${{ steps.ver.outputs.version }}.tar.gz
          fail_on_unmatched_files: true
